name: CI Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  pipeline-info:
    name: Pipeline Info
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show who triggered this pipeline
        run: |
          echo "============================================"
          echo "  Pipeline triggered by: ${{ github.actor }}"
          echo "  Event type:            ${{ github.event_name }}"
          echo "  Branch:                ${{ github.ref_name }}"
          echo "  Commit SHA:            ${{ github.sha }}"
          echo "  Commit message:        ${{ github.event.head_commit.message }}"
          echo "  Commit author:         ${{ github.event.head_commit.author.name }}"
          echo "  Commit author email:   ${{ github.event.head_commit.author.email }}"
          echo "  Repository:            ${{ github.repository }}"
          echo "  Run number:            ${{ github.run_number }}"
          echo "  Run ID:                ${{ github.run_id }}"
          echo "============================================"

      - name: Pipeline completed successfully
        run: |
          echo "Pipeline is running! Triggered by ${{ github.actor }} on branch ${{ github.ref_name }}."
